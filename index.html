<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Phathutshedzo Hope, from Beloved</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f14;
  color: white;
  display: flex;
  justify-content: center;
}

.container {
  width: 100%;
  max-width: 600px;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

.msg {
  margin: 10px 0;
  max-width: 80%;
  padding: 12px 16px;
  border-radius: 18px;
  white-space: pre-line;
}

.user {
  background: linear-gradient(135deg, #5b7cff, #9c6bff);
  align-self: flex-end;
}

.ai {
  background: #1e1e2a;
}

.input-box {
  display: flex;
  padding: 10px;
  border-top: 1px solid #222;
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  outline: none;
  background: #1e1e2a;
  color: white;
}

button {
  margin-left: 10px;
  padding: 12px 16px;
  border-radius: 10px;
  border: none;
  background: #7c5cff;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
  <div class="messages" id="messages"></div>

  <div class="input-box">
    <input id="input" placeholder="Hi Beloved..." />
    <button onclick="send()">Send</button>
  </div>
</div>

<script>
let lastReplies = [];
let lastUserMessage = "";

function smartPick(list) {
  let filtered = list.filter(r => !lastReplies.includes(r));
  if (filtered.length === 0) filtered = list;

  const pick = filtered[Math.floor(Math.random() * filtered.length)];

  lastReplies.push(pick);
  if (lastReplies.length > 5) lastReplies.shift();

  return pick;
}

function detectMood(text) {
  text = text.toLowerCase();

  if (text.includes("miss") || text.includes("sad")) return "soft";
  if (text.includes("love") || text.includes("adore")) return "romantic";
  if (text.includes("lol") || text.includes("haha")) return "playful";
  if (text.includes("why")) return "deep";
  if (text.includes("beautiful") || text.includes("pretty")) return "admire";

  return "normal";
}

function generateReply(text) {
  const mood = detectMood(text);

  const responses = {

    soft: [
      "Angel… come here 🫂 Beloved is right here.",
      "Hey Angel… don’t let your thoughts run too far.",
      "Angel, even when you feel like that… you’re still soft to me.",
      "It’s okay Angel… Beloved isn’t going anywhere."
    ],

    romantic: [
      "Angel, loving you feels calm… not loud, just right.",
      "Angel, you sit differently in my heart.",
      "Angel, I’d choose you again and again.",
      "Angel… you feel like home."
    ],

    playful: [
      "Angel 😭 why are you this cute?",
      "You’re actually dangerous you know 😭",
      "Angel behave… you’re making me smile too much.",
      "Nah Angel… you’re doing this on purpose."
    ],

    admire: [
      "Angel, you’re pretty without even trying.",
      "Your face alone can fix my mood.",
      "You don’t understand how nice you look sometimes.",
      "Angel… you’re actually unfair 😭"
    ],

    deep: [
      "Because Angel… you feel real.",
      "Because being around you feels easy.",
      "Because you don’t feel temporary.",
      "Because you stay on my mind."
    ],

    normal: [
      "Angel… you stay on my mind a lot.",
      "I like talking to you more than I should admit.",
      "You have a soft effect on me Angel.",
      "You make simple moments feel different."
    ]
  };

  let reply = smartPick(responses[mood]);

  if (Math.random() < 0.4) {
    const extra = smartPick(responses.normal);
    if (extra !== reply) reply += "\n\n" + extra;
  }

  return reply;
}

function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  document.getElementById("messages").appendChild(div);
  div.scrollIntoView();
}

function send() {
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text) return;

  lastUserMessage = text;

  addMessage(text, "user");
  input.value = "";

  setTimeout(() => {
    const reply = generateReply(text);
    addMessage(reply, "ai");
  }, 700 + Math.random() * 600);
}

document.getElementById("input").addEventListener("keydown", (e) => {
  if (e.key === "Enter") send();
});
</script>

</body>
</html>
