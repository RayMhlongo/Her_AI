<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For Phathutshedzo Hope, from Beloved</title>
  <style>
    * {
      border: 0;
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --white: hsl(0 0% 100%);
      --gray50: hsl(223 10% 95%);
      --gray100: hsl(223 10% 90%);
      --gray150: hsl(223 10% 85%);
      --gray200: hsl(223 10% 80%);
      --gray300: hsl(223 10% 70%);
      --gray400: hsl(223 10% 60%);
      --gray500: hsl(223 10% 50%);
      --gray600: hsl(223 10% 40%);
      --gray700: hsl(223 10% 30%);
      --gray800: hsl(223 10% 20%);
      --gray900: hsl(223 10% 10%);
      --gray950: hsl(223 10% 5%);
      --blue100: hsl(217 90% 90%);
      --blue300: hsl(217 90% 70%);
      --blue400: hsl(217 90% 60%);
      --blue500: hsl(217 90% 50%);
      --blue600: hsl(217 90% 40%);
      --blue600-02: hsl(217 90% 40% / 0.2);
      --blue800: hsl(217 90% 20%);
      --purple350: hsl(252 90% 65%);
      --purple350-02: hsl(252 90% 65% / 0.2);
      --magenta300: hsl(292 90% 70%);
      --magenta400: hsl(292 90% 60%);
      --black: hsl(0 0% 0%);
      --trans-dur: 0.3s;
      color-scheme: dark;
      font-size: clamp(0.875rem, 0.8409rem + 0.1705vw, 1.25rem);
    }

    body,
    button,
    input,
    textarea {
      color: var(--blue100);
      font: 1em / 1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      transition:
        background-color var(--trans-dur),
        box-shadow var(--trans-dur),
        color var(--trans-dur),
        opacity var(--trans-dur);
    }

    body {
      background:
        radial-gradient(circle at top left, hsl(292 90% 60% / 0.08), transparent 24%),
        radial-gradient(circle at bottom right, hsl(217 90% 50% / 0.08), transparent 28%),
        var(--gray900);
      display: grid;
      overflow-x: hidden;
      place-items: center;
      min-height: 100vh;
    }

    ul {
      margin-inline-start: 1.5em;
    }

    .chatbot {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100vw;
      min-height: 100vh;
    }

    .chatbot__container {
      width: 100%;
      max-width: 52em;
    }

    .chatbot__welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: auto;
      padding: 4.5em 1.5em;
      max-width: 33em;
    }

    .chatbot__icon {
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 4em;
      height: 4em;
    }

    .chatbot__icon--gradient {
      background:
        linear-gradient(135deg, var(--magenta400) 25%, var(--blue400) 60%, var(--blue800));
      box-shadow: 0 0.75em 2em hsl(0 0% 0% / 0.3);
      position: relative;
    }

    .chatbot__icon--gradient::before {
      background:
        linear-gradient(hsl(0 0% 100% / 0.5), hsl(0 0% 0% / 0.2), hsl(0 0% 0% / 0) 50%);
      border-radius: 50%;
      content: "";
      display: block;
      position: absolute;
      inset: 10%;
    }

    .chatbot__icon-svg {
      color: var(--white);
      display: block;
      width: 50%;
      height: 50%;
      position: relative;
      z-index: 1;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.75;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .chatbot__icon--small {
      width: 2.25em;
      height: 2.25em;
    }

    .chatbot__icon-wrapper {
      display: flex;
      justify-content: center;
      margin-bottom: 0.75em;
    }

    .chatbot__title {
      font-size: 1.125em;
      font-weight: 500;
      line-height: 1.333;
      text-align: center;
      margin-bottom: 0.5rem;
    }

    .chatbot__subtitle {
      color: var(--gray300);
      font-size: 0.95em;
      text-align: center;
      margin-bottom: 3rem;
    }

    .chatbot__suggestion {
      background-color: transparent;
      border-radius: 0.75em;
      color: var(--gray300);
      cursor: pointer;
      padding: 0.5em 0.75em;
      position: relative;
      text-align: start;
      z-index: 0;
    }

    .chatbot__suggestion::before {
      background: linear-gradient(90deg, var(--blue300), var(--blue500) 33%, var(--magenta300));
      border-radius: inherit;
      box-shadow:
        0 0.375em 0.5em hsl(0 0% 100% / 0.2) inset,
        0 -0.25em 0.25em hsl(0 0% 0% / 0.1) inset;
      content: "";
      display: block;
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity var(--trans-dur);
      z-index: -1;
    }

    .chatbot__suggestion:hover,
    .chatbot__suggestion:focus-visible {
      box-shadow: 0 0.75em 1em var(--blue600-02);
      color: var(--gray50);
      outline: none;
    }

    .chatbot__suggestion:hover::before,
    .chatbot__suggestion:focus-visible::before {
      opacity: 1;
    }

    .chatbot__suggestion-tag {
      background-color: var(--gray700);
      border-radius: 0.375em;
      color: var(--gray150);
      cursor: pointer;
      padding: 0 0.5em;
    }

    .chatbot__suggestion-tag:disabled {
      cursor: not-allowed;
      opacity: 0.5;
    }

    .chatbot__suggestion-tag:not(:disabled):hover,
    .chatbot__suggestion-tag:focus-visible {
      background-color: var(--gray50);
      color: var(--gray900);
      outline: none;
    }

    .chatbot__suggestion-tags {
      display: flex;
      gap: 0.5em;
      flex-wrap: wrap;
      margin-bottom: 0.75em;
    }

    .chatbot__suggestions-box {
      background-color: var(--gray800);
      border-radius: 1.5em;
      box-shadow: 0 4.5em 4.5em hsl(0 0% 0% / 0.2);
      display: flex;
      flex-direction: column;
      gap: 0.75em;
      padding: 0.75em;
      width: 100%;
      transition: background-color var(--trans-dur);
    }

    .chatbot__input {
      background-color: var(--gray700);
      border-radius: 1em;
      box-shadow:
        0 0 0 1px var(--gray800) inset,
        0 0.125em 0.125em hsl(0 0% 0% / 0.3);
      padding: 1em 0;
      padding-inline: 1em 3.5em;
      width: 100%;
      outline: none;
    }

    .chatbot__input::placeholder {
      color: var(--gray400);
    }

    .chatbot__input-wrapper {
      position: relative;
      width: 100%;
    }

    .chatbot__label {
      overflow: hidden;
      position: absolute;
      width: 1px;
      height: 1px;
    }

    .chatbot__submit {
      background-color: var(--gray100);
      border-radius: 50%;
      box-shadow:
        0 0 0 0.125em var(--gray100) inset,
        0 0.375em 0.25em hsl(0 0% 100% / 0.4) inset,
        0 1em 1.5em hsl(0 0% 0% / 0.2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      position: absolute;
      top: 50%;
      inset-inline-end: 0.5em;
      transform: translateY(-50%);
      width: 2.25em;
      height: 2.25em;
    }

    .chatbot__submit:disabled {
      cursor: not-allowed;
      opacity: 0.5;
    }

    .chatbot__submit:not(:disabled):hover {
      background-color: var(--white);
      box-shadow:
        0 0 0 0.125em var(--white) inset,
        0 0.375em 0.25em hsl(0 0% 100% / 0.4) inset,
        0 1em 1.5em hsl(0 0% 0% / 0.2);
    }

    .chatbot__submit--textarea {
      bottom: 0.5em;
      top: auto;
      transform: none;
    }

    .chatbot__submit-icon {
      color: var(--gray950);
      width: 1.25em;
      height: 1.25em;
      transition: color var(--trans-dur);
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .chatbot__conversation {
      display: none;
      flex-direction: column;
      height: 100vh;
    }

    .chatbot__conversation.is-visible {
      display: flex;
    }

    .chatbot__loader {
      margin: 0.375em 0;
      width: 1.5em;
      height: 1.5em;
      color: var(--white);
    }

    .chatbot__loader-line {
      animation: loader-line 1s linear infinite;
    }

    .chatbot__loader-line:nth-child(1) { animation-delay: -0.125s; }
    .chatbot__loader-line:nth-child(2) { animation-delay: -0.25s; }
    .chatbot__loader-line:nth-child(3) { animation-delay: -0.375s; }
    .chatbot__loader-line:nth-child(4) { animation-delay: -0.5s; }
    .chatbot__loader-line:nth-child(5) { animation-delay: -0.625s; }
    .chatbot__loader-line:nth-child(6) { animation-delay: -0.75s; }
    .chatbot__loader-line:nth-child(7) { animation-delay: -0.875s; }
    .chatbot__loader-line:nth-child(8) { animation-delay: -1s; }

    .chatbot__message {
      display: flex;
      flex-shrink: 0;
      gap: 0.75em;
      margin: 1.25em 0;
      min-height: 3.5em;
    }

    .chatbot__message:last-child {
      margin-bottom: 2.5em;
    }

    .chatbot__message--user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .chatbot__message--ai {
      align-self: flex-start;
    }

    .chatbot__message--ai-loading {
      animation: icon-appear calc(var(--trans-dur) * 2) ease-out;
    }

    .chatbot__message-icon {
      flex-shrink: 0;
    }

    .chatbot__message-bubble {
      background-color: var(--purple350);
      border-radius: 50%;
      position: absolute;
      bottom: 0.25em;
      inset-inline-end: -0.125em;
      width: 1.25em;
      height: 1.25em;
    }

    .chatbot__message-bubble--end {
      inset-inline-end: -0.5em;
      bottom: 0;
      width: 0.5em;
      height: 0.5em;
    }

    .chatbot__message-content {
      animation: message-appear var(--trans-dur) cubic-bezier(0.65, 0, 0.35, 1);
      border-radius: 1.75em;
      padding: 1em 1.25em;
      padding-inline-end: 1.5em;
      position: relative;
      min-width: 3.5em;
      max-width: min(36em, calc(100vw - 8em));
      transition:
        background-color var(--trans-dur),
        box-shadow var(--trans-dur);
    }

    .chatbot__message-role {
      display: block;
      font-size: 0.68em;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      opacity: 0.82;
      margin-bottom: 0.45em;
      font-weight: 600;
    }

    .chatbot__message-text {
      white-space: pre-line;
    }

    .chatbot__message-text + .chatbot__message-text {
      margin-top: 1.5em;
    }

    .chatbot__message--user .chatbot__message-content {
      background: linear-gradient(135deg, var(--blue500), var(--purple350) calc(100% - 1.25em));
      box-shadow:
        0 0.375em 0.5em hsl(0 0% 100% / 0.2) inset,
        0 -0.25em 0.25em hsl(0 0% 0% / 0.1) inset,
        0 1.5em 1.5em var(--purple350-02);
      color: var(--white);
      text-shadow: 0 0 0.25em hsl(0 0% 0% / 0.3);
      transform-origin: calc(100% + 0.75em) 100%;
    }

    .chatbot__message--ai .chatbot__message-content {
      background-color: var(--gray800);
      box-shadow: 0 1.5em 1.5em hsl(0 0% 0% / 0.1);
      transform-origin: 0 0;
    }

    .chatbot__message--ai .chatbot__message-text {
      animation: text-appear calc(var(--trans-dur) * 2) linear forwards;
      opacity: 1;
    }

    .chatbot__message-scroller {
      flex: 1;
      overflow: hidden auto;
      scrollbar-gutter: stable;
    }

    .chatbot__messages {
      display: flex;
      flex-direction: column;
      padding: 0 1.5em;
    }

    .chatbot__input-box {
      background-color: var(--gray800);
      border-radius: 1.5em;
      box-shadow: 0 4.5em 4.5em hsl(0 0% 0% / 0.2);
      margin: 0 auto 1.5em;
      padding: 0.75em;
      position: relative;
      width: calc(100% - 3em);
      transition: background-color var(--trans-dur);
    }

    .chatbot__input-box::before {
      background-color: var(--gray900);
      mask-image: linear-gradient(hsl(0 0% 0% / 0), hsl(0 0% 0%));
      -webkit-mask-image: linear-gradient(hsl(0 0% 0% / 0), hsl(0 0% 0%));
      content: "";
      display: block;
      position: absolute;
      inset: auto 0 100% 0;
      inset-inline: -1.5em -0.625em;
      height: 1.5em;
      transition: background-color var(--trans-dur);
    }

    .chatbot__textarea {
      background-color: var(--gray700);
      border-radius: 1em;
      box-shadow:
        0 0 0 1px var(--gray800) inset,
        0 0.125em 0.125em hsl(0 0% 0% / 0.3);
      display: block;
      padding: 1em 1em 3.25em;
      outline: none;
      resize: none;
      min-height: 9em;
      width: 100%;
    }

    .chatbot__textarea::placeholder {
      color: var(--gray400);
    }

    .chatbot__textarea-wrapper {
      position: relative;
    }

    .chatbot__globe-button {
      background: transparent;
      color: var(--gray300);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      position: absolute;
      bottom: 1em;
      inset-inline-start: 1em;
      width: 1.5em;
      height: 1.5em;
    }

    .chatbot__globe-button:hover {
      color: var(--gray100);
    }

    .chatbot__globe-icon {
      width: 1em;
      height: 1em;
      stroke: currentColor;
      fill: currentColor;
    }

    .chatbot__welcome[hidden] {
      display: none;
    }

    @keyframes icon-appear {
      from, 50% {
        opacity: 0;
        transform: translateY(33%);
      }
      to {
        opacity: 1;
        transform: translateY(1);
      }
    }

    @keyframes loader-line {
      from, 67%, to {
        opacity: 0.2;
      }
      33% {
        opacity: 1;
      }
    }

    @keyframes message-appear {
      from {
        opacity: 0;
        transform: scale(0);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes text-appear {
      from, 50% {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    @media (max-width: 640px) {
      .chatbot__welcome {
        padding: 3em 1em;
      }
      .chatbot__messages {
        padding: 0 0.85em;
      }
      .chatbot__input-box {
        width: calc(100% - 1.5em);
        margin-bottom: 0.75em;
      }
      .chatbot__message-content {
        max-width: calc(100vw - 5em);
      }
      .chatbot__textarea {
        min-height: 7.5em;
      }
    }
  </style>
</head>
<body>
  <main class="chatbot">
    <div class="chatbot__container">
      <div class="chatbot__welcome" id="welcome">
        <div class="chatbot__icon-wrapper">
          <div class="chatbot__icon chatbot__icon--gradient">
            <svg class="chatbot__icon-svg" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3l1.4 4.1L17.5 8.5l-4.1 1.4L12 14l-1.4-4.1L6.5 8.5l4.1-1.4L12 3z"></path>
              <path d="M18.5 14l.9 2.6 2.6.9-2.6.9-.9 2.6-.9-2.6-2.6-.9 2.6-.9.9-2.6z"></path>
              <path d="M5.5 14.5l.7 2 .8.3-.8.3-.7 2-.7-2-.8-.3.8-.3.7-2z"></path>
            </svg>
          </div>
        </div>
        <h1 class="chatbot__title">For Phathutshedzo Hope, from Beloved</h1>
        <p class="chatbot__subtitle">Same original layout feel, but now Angel is the user and Beloved Bot replies.</p>

        <div class="chatbot__suggestions-box">
          <button class="chatbot__suggestion" data-send="How much does Beloved adore Angel?">How much does Beloved adore Angel?</button>
          <button class="chatbot__suggestion" data-send="What makes Angel smile?">What makes Angel smile?</button>
          <button class="chatbot__suggestion" data-send="Write Angel something sweet">Write Angel something sweet</button>

          <div class="chatbot__input-wrapper">
            <label class="chatbot__label" for="chat-input">Message</label>
            <input
              id="chat-input"
              class="chatbot__input"
              type="text"
              placeholder="Hi Angel, ask anything"
              autocomplete="off"
            />
            <button class="chatbot__submit" id="welcomeSubmit" aria-label="Submit">
              <svg class="chatbot__submit-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M5 12h14"></path>
                <path d="m12 5 7 7-7 7"></path>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <div class="chatbot__conversation" id="conversation">
        <div class="chatbot__message-scroller" id="scroller">
          <div class="chatbot__messages" id="messages"></div>
        </div>

        <div class="chatbot__input-box">
          <div class="chatbot__suggestion-tags">
            <button class="chatbot__suggestion-tag" type="button" data-send="Tell Angel why Beloved smiles around her">Tell me more</button>
            <button class="chatbot__suggestion-tag" type="button" data-send="Make Angel smile with something playful">Make me smile</button>
            <button class="chatbot__suggestion-tag" type="button" data-send="Write Angel another sweet message">Another one</button>
          </div>

          <div class="chatbot__textarea-wrapper">
            <label class="chatbot__label" for="chat-textarea">Message</label>
            <textarea
              id="chat-textarea"
              class="chatbot__textarea"
              placeholder="Hi Beloved Bot..."
              rows="1"
            ></textarea>

            <button class="chatbot__globe-button" aria-label="Heart">
              <svg class="chatbot__globe-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 20.5s-7-4.4-7-10a4.1 4.1 0 0 1 7-2.7A4.1 4.1 0 0 1 19 10.5c0 5.6-7 10-7 10z"></path>
              </svg>
            </button>

            <button class="chatbot__submit chatbot__submit--textarea" id="chatSubmit" aria-label="Submit">
              <svg class="chatbot__submit-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M5 12h14"></path>
                <path d="m12 5 7 7-7 7"></path>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <template id="loader-template">
    <div class="chatbot__message chatbot__message--ai chatbot__message--ai-loading" id="loading-message">
      <div class="chatbot__message-icon">
        <div class="chatbot__icon chatbot__icon--gradient chatbot__icon--small">
          <svg class="chatbot__icon-svg" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 12v1a5 5 0 0 0 5 5h1"></path>
            <path d="M20 12v1a5 5 0 0 1-5 5h-1"></path>
            <path d="M4 12V9a8 8 0 0 1 16 0v3"></path>
            <path d="M8 17v2"></path>
            <path d="M16 17v2"></path>
          </svg>
        </div>
      </div>
      <div class="chatbot__message-content">
        <span class="chatbot__message-role">Beloved Bot</span>
        <svg class="chatbot__loader lucide lucide-loader-icon lucide-loader" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path class="chatbot__loader-line" d="m4.9 4.9 2.9 2.9"></path>
          <path class="chatbot__loader-line" d="M2 12h4"></path>
          <path class="chatbot__loader-line" d="m4.9 19.1 2.9-2.9"></path>
          <path class="chatbot__loader-line" d="M12 18v4"></path>
          <path class="chatbot__loader-line" d="m16.2 16.2 2.9 2.9"></path>
          <path class="chatbot__loader-line" d="M18 12h4"></path>
          <path class="chatbot__loader-line" d="m16.2 7.8 2.9-2.9"></path>
          <path class="chatbot__loader-line" d="M12 2v4"></path>
        </svg>
      </div>
    </div>
  </template>

  <script>
    const welcome = document.getElementById("welcome");
    const conversation = document.getElementById("conversation");
    const messages = document.getElementById("messages");
    const scroller = document.getElementById("scroller");
    const welcomeInput = document.getElementById("chat-input");
    const chatTextarea = document.getElementById("chat-textarea");
    const welcomeSubmit = document.getElementById("welcomeSubmit");
    const chatSubmit = document.getElementById("chatSubmit");
    const loaderTemplate = document.getElementById("loader-template");

    const placeholder = "Hi Beloved Bot...";
    let loadingNode = null;

    let recentReplies = [];
    let conversationMemory = {
      lastUserMessage: "",

        "Angel, your smile is dangerous in a very lovely way.",

      ],
      sweet: [
        "My Angel,\n\nYou have a way of making ordinary moments feel softer.\nBeloved likes how your presence feels calm, warm, and easy to appreciate.\nYou stay on the heart in the gentlest way.",
        "My Angel,\n\nBeloved likes the way your smile can change the mood of a moment.\nThere is something very sweet about you that lingers long after the conversation ends.",
        "My Angel,\n\nYou make things feel lighter.\nBeloved likes your softness, your energy, and the little way you make everything feel more special.",
        "My Angel,\n\nBeloved thinks you are easy to admire and even easier to miss.\nThat is your effect.",
        "My Angel,\n\nYou have a lovely way of being remembered even in quiet moments.\nBeloved just wanted you to know that."
      ],
      playful: [
        "Angel, Beloved was trying to be productive, but then your face entered the conversation.",
        "Angel, this is Beloved filing a complaint: you are too easy to think about.",
        "Angel, your smile keeps interfering with Beloved's plan to be normal.",
        "Angel, Beloved would behave, but then you go and be lovely.",
        "Angel, you are suspiciously good at making Beloved grin for no reason.",
        "Angel, Beloved blames your smile for all this softness.",
        "Angel, it is becoming difficult for Beloved to act composed when you are being this cute.",
        "Angel, you really do move through Beloved's mind like you pay rent there.",
        "Angel, Beloved was calm five minutes ago. Then you smiled.",
        "Angel, your face has entirely too much influence over Beloved's mood."
      ],
      pretty: [
        "Angel, Beloved thinks you are pretty in a way that stays in the mind.",
        "Angel, your beauty feels soft and striking at the same time.",
        "Angel, Beloved thinks you carry yourself in a quietly beautiful way.",
        "Angel, you have the kind of beauty that lingers after the moment passes.",
        "Angel, Beloved notices your prettiness even in the smallest moments.",
        "Angel, you are lovely in a way Beloved finds hard to ignore.",
        "Angel, Beloved thinks your smile and your face work together to cause problems for his focus.",
        "Angel, you have a gentle kind of beauty Beloved really likes."
      ],
      comfort: [
        "Angel, come here for a second. Beloved wants you to breathe and be gentle with yourself.",
        "Angel, even when your heart feels heavy, Beloved still wants you to know you are deeply appreciated.",
        "Angel, Beloved is right here. You do not have to carry every feeling so harshly by yourself.",
        "Angel, soft hearts feel deeply, and Beloved wants to handle yours carefully.",
        "Angel, if today feels a bit too much, Beloved hopes this message lands like a warm hand on your heart.",
        "Angel, Beloved would rather remind you gently than let you sit alone with heavy thoughts.",
        "Angel, you are still lovely even on the days you feel quieter or more fragile.",
        "Angel, Beloved wants peace to find you properly."
      ],
      miss: [
        "Angel, being missed by Beloved is one thing, but the truth is Beloved misses you too in the quiet moments.",
        "Angel, there is a certain softness missing when you are not around.",
        "Angel, Beloved notices your absence in the little spaces of the day.",
        "Angel, missing you has a very quiet way of showing up.",
        "Angel, you leave a softness behind, so of course Beloved notices when you are not there.",
        "Angel, your absence has a way of making everything feel slightly less warm."
      ],
      why: [
        "Beloved likes Angel because you feel genuine and easy to appreciate.",
        "Beloved likes Angel because your smile feels like relief after a long day.",
        "Beloved likes Angel because your presence feels warm without trying too hard.",
        "Beloved likes Angel because you make little moments feel like they matter.",
        "Beloved likes Angel because your softness never feels fake.",
        "Beloved likes Angel because your energy stays on the heart.",
        "Beloved likes Angel because being around you feels calm and good.",
        "Beloved likes Angel because you are lovely in both the obvious and quiet ways."
      ],
      morning: [
        "Good morning, Angel. Beloved hopes today feels light, kind, and a little softer because you are in it.",
        "Good morning, Angel. Beloved hopes your day starts peacefully and gives you reasons to smile.",
        "Morning, Angel. Just a little reminder from Beloved that you are lovely to think about.",
        "Good morning, Angel. May your mood be calm and your smile show up often today.",
        "Morning, Angel. Beloved hopes today treats you gently."
      ],
      night: [
        "Good night, Angel. Beloved hopes your heart rests softly tonight.",
        "Sleep well, Angel. Beloved hopes peace finds you before sleep does.",
        "Good night, Angel. You deserve a calm mind and soft rest.",
        "Rest well, Angel. Beloved hopes tomorrow greets you kindly.",
        "Good night, Angel. Beloved is sending you a quiet little softness before bed."
      ],
      default: [
        "Angel, Beloved thinks you make the day softer just by being in it.",
        "Angel, Beloved likes how naturally you can make a moment feel lighter.",
        "Angel, even a small thought of you can make Beloved smile.",
        "Angel, you are very easy for Beloved to think about in a warm way.",
        "Angel, Beloved hopes this makes you smile a little.",
        "Angel, your vibe is sweet, calm, and very easy to appreciate.",
        "Angel, Beloved thinks you deserve gentle words and nice moments.",
        "Angel, you stay on Beloved's mind in a soft way.",
        "Angel, Beloved still thinks your smile is one of your strongest weapons.",
        "Angel, this is your reminder that you are very lovely to Beloved."
      ]
    };

    const followUps = [
      "And somehow, Angel, that keeps happening without you even trying.",
      "Beloved just thought you should know that.",
      "That is the kind of effect you have.",
      "Beloved is honestly not even complaining.",
      "That thought has been sitting gently in Beloved's mind.",
      "So yes, Angel, that means something."
    ];

    function pickUnique(list) {
      let available = list.filter(item => !recentReplies.includes(item));
      if (!available.length) available = list;

      const choice = available[Math.floor(Math.random() * available.length)];
      recentReplies.push(choice);

      if (recentReplies.length > 8) {
        recentReplies.shift();
      }

      return choice;
    }

    function detectGroup(text) {
      const value = text.toLowerCase();

      if (value.includes("good morning") || value.includes("morning")) return "morning";
      if (value.includes("good night") || value.includes("night") || value.includes("sleep")) return "night";
      if (value.includes("miss") || value.includes("absence")) return "miss";
      if (value.includes("sad") || value.includes("hurt") || value.includes("heavy") || value.includes("down") || value.includes("cry")) return "comfort";
      if (value.includes("adore") || value.includes("love") || value.includes("how much")) return "adore";
      if (value.includes("smile") || value.includes("happy") || value.includes("grin")) return "smile";
      if (value.includes("sweet") || value.includes("message") || value.includes("write")) return "sweet";
      if (value.includes("playful") || value.includes("funny") || value.includes("tease")) return "playful";
      if (value.includes("pretty") || value.includes("beautiful") || value.includes("gorgeous") || value.includes("lovely")) return "pretty";
      if (value.includes("why")) return "why";
      return "default";
    }

    function generateReply(text) {
      const group = detectGroup(text);
      conversationMemory.lastDetectedGroup = group;

      let reply = pickUnique(responseGroups[group] || responseGroups.default);

      if (conversationMemory.messageCount > 1 && Math.random() < 0.35) {
        const followUp = pickUnique(followUps);
        if (!reply.includes(followUp)) {
          reply += "\n\n" + followUp;
        }
      }

      if (Math.random() < 0.25 && group !== "default") {
        const extra = pickUnique(responseGroups.default);
        if (extra !== reply) {
          reply += "\n\n" + extra;
        }
      }

      if (text.toLowerCase().includes("beloved")) {
        reply += "\n\nAngel, Beloved likes hearing that name from you.";
      }

      return reply;
    }

    function showConversation() {
      welcome.hidden = true;
      conversation.classList.add("is-visible");
      chatTextarea.placeholder = placeholder;
      setTimeout(() => {
        chatTextarea.focus();
      }, 30);
    }

    function createIcon(kind) {
      if (kind === "ai") {
        return `
          <div class="chatbot__icon chatbot__icon--gradient chatbot__icon--small">
            <svg class="chatbot__icon-svg" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 12v1a5 5 0 0 0 5 5h1"></path>
              <path d="M20 12v1a5 5 0 0 1-5 5h-1"></path>
              <path d="M4 12V9a8 8 0 0 1 16 0v3"></path>
              <path d="M8 17v2"></path>
              <path d="M16 17v2"></path>
            </svg>
          </div>
        `;
      }

      return "";
    }

    function appendMessage(role, content) {
      const wrap = document.createElement("div");
      wrap.className = `chatbot__message chatbot__message--${role}`;

      const isAI = role === "ai";
      const roleName = isAI ? "Beloved Bot" : "Angel";

      wrap.innerHTML = `
        ${isAI ? `<div class="chatbot__message-icon">${createIcon("ai")}</div>` : ""}
        <div class="chatbot__message-content">
          <span class="chatbot__message-role">${roleName}</span>
          <div class="chatbot__message-text"></div>
          ${!isAI ? `
            <div class="chatbot__message-bubble"></div>
            <div class="chatbot__message-bubble chatbot__message-bubble--end"></div>
          ` : ""}
        </div>
      `;

      wrap.querySelector(".chatbot__message-text").textContent = content;
      messages.appendChild(wrap);
      scroller.scrollTo({ top: scroller.scrollHeight, left: 0, behavior: "smooth" });
    }

    function showLoader() {
      hideLoader();
      loadingNode = loaderTemplate.content.firstElementChild.cloneNode(true);
      messages.appendChild(loadingNode);
      scroller.scrollTo({ top: scroller.scrollHeight, left: 0, behavior: "smooth" });
    }

    function hideLoader() {
      if (loadingNode && loadingNode.parentNode) {
        loadingNode.parentNode.removeChild(loadingNode);
      }
      loadingNode = null;
    }

    function setButtonsDisabled(state) {
      welcomeSubmit.disabled = state;
      chatSubmit.disabled = state;
      document.querySelectorAll("[data-send]").forEach((button) => {
        button.disabled = state;
      });
    }

    function autoResizeTextarea() {
      chatTextarea.style.height = "auto";
      chatTextarea.style.height = Math.max(144, Math.min(chatTextarea.scrollHeight, 260)) + "px";
    }

    function typingDelay(text) {
      const base = 700;
      const perChar = Math.min(text.length * 8, 900);
      return base + perChar + Math.random() * 400;
    }

    function sendMessage(text, source) {
      const messageText = (text || "").trim();
      if (!messageText) return;

      conversationMemory.lastUserMessage = messageText;
      conversationMemory.messageCount += 1;

      showConversation();
      appendMessage("user", messageText);

      if (source === "welcome") {
        welcomeInput.value = "";
      } else {
        chatTextarea.value = "";
        autoResizeTextarea();
      }

      setButtonsDisabled(true);
      showLoader();

      const reply = generateReply(messageText);

      setTimeout(() => {
        hideLoader();
        appendMessage("ai", reply);
        setButtonsDisabled(false);
      }, typingDelay(reply));
    }

    function sendFromWelcome() {
      sendMessage(welcomeInput.value, "welcome");
    }

    function sendFromChat() {
      sendMessage(chatTextarea.value, "chat");
    }

    welcomeSubmit.addEventListener("click", sendFromWelcome);
    chatSubmit.addEventListener("click", sendFromChat);

    welcomeInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        sendFromWelcome();
      }
    });

    chatTextarea.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        sendFromChat();
      }
    });

    chatTextarea.addEventListener("input", autoResizeTextarea);
    autoResizeTextarea();

    document.querySelectorAll("[data-send]").forEach((button) => {
      button.addEventListener("click", () => {
        const text = button.getAttribute("data-send") || "";
        sendMessage(text, button.closest(".chatbot__welcome") ? "welcome" : "chat");
      });
    });
  </script>
</body>
